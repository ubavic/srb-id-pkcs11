name: "Build and release"

on:
  push:
    tags:
      - "v*"

env:
  LIB_NAME: "libsrb-id-pkcs11"
  ZIG_VERSION: "0.16.0"
  VERSION_FILE: "src/version.zig"
  RELEASE_MODE: "ReleaseSafe"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.setversion.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Check tag version
        id: setversion
        run: |
          zon_version=$(grep -Po '(?<=^\s{4}.version = ")[\d\.]+(?=",)' build.zig.zon)
          tag="${{github.ref_name}}"

          if [ "$tag" != "v$zon_version" ]; then
            echo "Error: tag ($tag) does not match zon file version ($zon_version)"
            exit 1
          fi

          echo "version=$zon_version" >> $GITHUB_OUTPUT

  test:
    needs: [check-version]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libpcsclite-dev
      - name: Install macOS deps
        if: matrix.os == 'macos-15-intel' ||  matrix.os == 'macos-latest'
        run: |
          brew update
          brew install pcsc-lite
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Test
        run: |
          zig build test

  buildLinux:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Linux deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libpcsclite-dev
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=${{ env.RELEASE_MODE }} -Dcpu=baseline
          mkdir artifact
          cp zig-out/lib/*.so.*.*.* artifact/.
      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: linux-build-artifact
          path: artifact/*

  buildWindows:
    runs-on: windows-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=${{ env.RELEASE_MODE }} -Dcpu=baseline
          mkdir artifact
          cp zig-out/bin/srb-id-pkcs11.dll artifact/srb-id-pkcs11.${{needs.test.outputs.version}}.dll
      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-artifact
          path: artifact/*

  buildMacArm:
    runs-on: macos-latest
    needs: [test]
    steps:
      - name: Checkout mac-os branch
        uses: actions/checkout@v7
      - name: Install macOS deps
        run: |
          brew update
          brew install pcsc-lite
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=${{ env.RELEASE_MODE }} -Dcpu=baseline
          mkdir artifact
          cp zig-out/lib/$LIB_NAME.*.*.*.dylib artifact/$LIB_NAME.arm.${{needs.test.outputs.version}}.dylib
      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm-build-artifact
          path: artifact/*

  buildMacIntel:
    runs-on: macos-15-intel
    needs: [test]
    steps:
      - name: Checkout mac-os branch
        uses: actions/checkout@v7
      - name: Install macOS deps
        run: |
          brew update
          brew install pcsc-lite
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=${{ env.RELEASE_MODE }} -Dcpu=baseline
          mkdir artifact
          cp zig-out/lib/$LIB_NAME.*.*.*.dylib artifact/$LIB_NAME.x64.${{needs.test.outputs.version}}.dylib
      - name: Upload library
        uses: actions/upload-artifact@v7
        with:
          name: macos-intel-build-artifact
          path: artifact/*

  release:
    runs-on: ubuntu-latest
    needs: [buildLinux, buildMacArm, buildMacIntel, buildWindows]
    permissions:
      contents: write
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
      - name: Move files
        run: |
          mv linux-build-artifact/* .
          mv macos-arm-build-artifact/* .
          mv macos-intel-build-artifact/* .
          mv windows-build-artifact/* .
      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG".."${{ github.ref_name }}" --pretty=format:"- %s" | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" | head -50)
          fi

          PAYLOAD=$(jq -n \
            --arg commits "$COMMITS" \
            --arg version "${{ github.ref_name }}" \
            '{
              model: "gpt-4o-mini",
              messages: [{
                role: "user",
                content: ("Write release notes for version " + $version + " based ONLY on the commit messages below. Only include changes that affect end users of the library (new features, bug fixes, behavior changes). Skip anything related to CI, workflows, release scripts, tooling, or internal repository maintenance. Do not invent anything. Group into Features and Fixes. If nothing user-facing remains, write: \"No user-facing changes.\". Output plain markdown.\n\nCommits:\n" + $commits)
              }],
              max_tokens: 512
            }')

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://models.inference.ai.azure.com/chat/completions")

          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No release notes generated."')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./*.so.*
            ./*.dylib
            ./*.dll
          tag_name: ${{github.ref_name}}
      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit ${{ github.ref_name }} --notes "${{ steps.notes.outputs.notes }}" --repo ${{ github.repository }}
