name: "Build and release"

on:
  push:
    tags:
      - "v*"

env:
  LIB_NAME: "libsrb-id-pkcs11"
  ZIG_VERSION: "0.16.0"
  VERSION_FILE: "src/version.zig"

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.setversion.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check tag version
        id: setversion
        run: |
          zon_version=$(grep -Po '(?<=^\s{4}.version = ")[\d\.]+(?=",)' build.zig.zon)
          tag="${{github.ref_name}}"

          if [ "$tag" != "v$zon_version" ]; then
            echo "Error: tag ($tag) does not match zon file version ($zon_version)"
            exit 1
          fi

          echo "version=$zon_version" >> $GITHUB_OUTPUT
      - name: Install Linux deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libpcsclite-dev
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Test
        run: |
          zig build test

  buildLinux:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libpcsclite-dev
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=ReleaseSmall -Dcpu=baseline
          mkdir artifact
          cp zig-out/lib/*.so.*.*.* artifact/.
      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-artifact
          path: artifact/*

  buildWindows:
    runs-on: windows-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=ReleaseSmall -Dcpu=baseline
          mkdir artifact
          cp zig-out/bin/srb-id-pkcs11.dll artifact/srb-id-pkcs11.${{needs.test.outputs.version}}.dll
      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-artifact
          path: artifact/*

  buildMacArm:
    runs-on: macos-latest
    needs: [test]
    steps:
      - name: Checkout mac-os branch
        uses: actions/checkout@v4
      - name: Install macOS deps
        run: |
          brew update
          brew install pcsc-lite
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=ReleaseSmall -Dcpu=baseline
          mkdir artifact
          cp zig-out/lib/$LIB_NAME.*.*.*.dylib artifact/$LIB_NAME.arm.${{needs.test.outputs.version}}.dylib
      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build-artifact
          path: artifact/*

  buildMacIntel:
    runs-on: macos-15-intel
    needs: [test]
    steps:
      - name: Checkout mac-os branch
        uses: actions/checkout@v4
      - name: Install macOS deps
        run: |
          brew update
          brew install pcsc-lite
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build
        run: |
          zig build -Doptimize=ReleaseSmall -Dcpu=baseline
          mkdir artifact
          cp zig-out/lib/$LIB_NAME.*.*.*.dylib artifact/$LIB_NAME.x64.${{needs.test.outputs.version}}.dylib
      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build-artifact
          path: artifact/*

  release:
    runs-on: ubuntu-latest
    needs: [buildLinux, buildMacArm, buildMacIntel, buildWindows]
    steps:
      - uses: actions/download-artifact@v4
      - name: Move files
        run: |
          mv linux-build-artifact/* .
          mv macos-arm-build-artifact/* .
          mv macos-intel-build-artifact/* .
          mv windows-build-artifact/* .
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./*.so.*
            ./*.dylib
            ./*.dll
          tag_name: ${{github.ref_name}}
